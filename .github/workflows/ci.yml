name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ui-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create .env file
        run: |
          echo "BASE_URL=${{ secrets.BASE_URL }}" >> .env
          echo "DEFAULT_PASSWORD=${{ secrets.DEFAULT_PASSWORD }}" >> .env

      - name: Build Docker image
        run: docker compose build

      - name: Run UI tests
        run: docker compose run --rm ui-tests

      - name: Upload UI test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ui-test-report
          path: apps/ui-tests/reports/cucumber-report.html

  api-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create API environment file
        run: |
          sed -e "s|YOUR_BASE_URL|${{ secrets.API_BASE_URL }}|" \
              -e "s|YOUR_EMAIL|${{ secrets.API_EMAIL }}|" \
              -e "s|YOUR_PASSWORD|${{ secrets.API_PASSWORD }}|" \
              apps/api-tests/environments/prod.env.json.example \
              > apps/api-tests/environments/prod.env.json

      - name: Run API tests
        run: >
          docker compose run --rm api-tests
          run collections/api.collection.json
          --environment environments/prod.env.json
          --reporters cli,junit
          --reporter-junit-export reports/report.xml

      - name: Upload API test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-test-report
          path: apps/api-tests/reports/report.xml
